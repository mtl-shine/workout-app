<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym">
<meta name="theme-color" content="#0f0f13">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Gym</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=Golos+Text:wght@400;500;600&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222d;
    --surface3: #2a2a38;
    --accent: #c8f060;
    --accent2: #7b61ff;
    --accent3: #ff6b6b;
    --text: #f0f0f5;
    --text2: #9090a8;
    --text3: #5a5a72;
    --border: #2e2e3e;
    --gym-color: #c8f060;
    --home-color: #7b61ff;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Golos Text', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  h1, h2, h3 { font-family: 'Unbounded', sans-serif; }

  .app-header {
    padding: 18px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .app-title { font-size: 18px; font-weight: 700; letter-spacing: 0.08em; color: var(--accent); }
  .day-badge {
    font-size: 11px;
    font-family: 'Unbounded', sans-serif;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .day-badge.gym { background: rgba(200,240,96,0.15); color: var(--gym-color); }
  .day-badge.home { background: rgba(123,97,255,0.15); color: var(--home-color); }

  .bottom-nav {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 200;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 12px 8px 10px;
    border: none; background: none;
    color: var(--text3);
    font-family: 'Golos Text', sans-serif; font-size: 11px;
    cursor: pointer; transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; line-height: 1; }

  .screen { display: none; padding: 14px 14px 100px; }
  .screen.active { display: block; }

  .day-tabs {
    display: flex; gap: 6px;
    margin-bottom: 16px;
    overflow-x: auto; padding-bottom: 4px;
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: none; color: var(--text2);
    font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .day-tab.active.gym { border-color: var(--gym-color); color: var(--gym-color); background: rgba(200,240,96,0.08); }
  .day-tab.active.home { border-color: var(--home-color); color: var(--home-color); background: rgba(123,97,255,0.08); }

  .section-label {
    font-size: 10px;
    font-family: 'Unbounded', sans-serif;
    letter-spacing: 0.12em; color: var(--text3);
    text-transform: uppercase;
    margin: 18px 0 8px; padding-left: 2px;
  }
  .section-label:first-child { margin-top: 0; }

  /* EXERCISE CARD */
  .ex-card {
    background: var(--surface);
    border-radius: var(--radius);
    margin-bottom: 8px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .ex-header {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 12px 10px;
    cursor: pointer; user-select: none;
  }
  .ex-num {
    font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 700;
    color: var(--text3); min-width: 16px; padding-top: 2px;
  }
  .ex-info { flex: 1; min-width: 0; }
  .ex-name { font-size: 13px; font-weight: 600; line-height: 1.35; color: var(--text); margin-bottom: 4px; }
  .ex-meta-line { font-size: 11px; color: var(--text3); margin-bottom: 6px; }

  /* SET DOTS */
  .sets-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .set-dot {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: none; cursor: pointer;
    transition: all 0.18s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .set-dot:active { transform: scale(0.88); }
  .set-dot.done { background: var(--accent); border-color: var(--accent); }
  .sets-done-check { font-size: 18px; color: var(--accent); }
  .sets-done-label { font-size: 11px; color: var(--accent); margin-left: 2px; }

  /* WEIGHT */
  .ex-right {
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0;
  }
  .ex-weight-controls {
    display: flex; align-items: center; gap: 4px;
    background: var(--surface2); border-radius: 8px; padding: 3px;
  }
  .w-btn {
    width: 28px; height: 28px; border-radius: 6px;
    border: none; background: var(--surface3); color: var(--text);
    font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .w-btn:active { background: var(--accent); color: var(--bg); }
  .w-value {
    font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 600;
    color: var(--text); min-width: 54px; text-align: center; white-space: nowrap;
  }
  .w-history-btn {
    font-size: 10px; color: var(--text3);
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 3px;
    transition: color 0.2s;
  }
  .w-history-btn:hover { color: var(--accent); }

  .ex-chevron { color: var(--text3); transition: transform 0.3s; flex-shrink: 0; margin-top: 3px; }
  .ex-detail.open ~ * .ex-chevron { transform: rotate(180deg); }

  .ex-detail { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
  .ex-detail.open { max-height: 1500px; }
  .ex-detail-inner { padding: 12px 12px 14px; border-top: 1px solid var(--border); }

  .tech-text { font-size: 13px; color: var(--text2); line-height: 1.7; white-space: pre-line; }

  .timer-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface2); border-radius: 20px;
    padding: 5px 12px; font-size: 12px; color: var(--text2);
    cursor: pointer; margin-bottom: 10px;
    border: 1px solid var(--border); transition: border-color 0.2s;
  }
  .timer-chip.running { border-color: var(--accent); color: var(--accent); }
  .timer-display { font-family: 'Unbounded', sans-serif; font-size: 11px; min-width: 30px; }

  .media-placeholder {
    margin-top: 12px;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .media-placeholder:hover { border-color: var(--accent); background: rgba(200,240,96,0.04); }
  .media-placeholder-text { font-size: 12px; color: var(--text3); }
  .media-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .media-thumb { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; cursor: pointer; }
  .media-video-thumb {
    width: 80px; height: 80px; border-radius: 8px;
    background: var(--surface3);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 28px;
  }
  .media-item { position: relative; display: inline-block; }
  .media-remove {
    position: absolute; top: 2px; right: 2px;
    width: 18px; height: 18px;
    background: var(--accent3); border: none; border-radius: 50%;
    color: white; font-size: 11px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; z-index: 2;
  }

  /* MODALS */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 500;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 20px 20px 40px;
    width: 100%; max-width: 480px; max-height: 80vh;
    overflow-y: auto; animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
  .modal-title { font-size: 13px; font-weight: 700; margin-bottom: 14px; font-family: 'Unbounded', sans-serif; line-height: 1.4; }

  .history-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .history-item:last-child { border-bottom: none; }
  .history-date { font-size: 12px; color: var(--text2); }
  .history-weight { font-family: 'Unbounded', sans-serif; font-size: 14px; font-weight: 600; color: var(--text); }
  .history-diff { font-size: 11px; }
  .history-diff.up { color: var(--accent); }
  .history-diff.down { color: var(--accent3); }
  .history-diff.same { color: var(--text3); }

  /* LIGHTBOX */
  .lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.95); z-index: 600;
    align-items: center; justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lightbox img, .lightbox video { max-width: 100%; max-height: 88vh; border-radius: 8px; }
  .lightbox-close {
    position: absolute; top: 20px; right: 20px;
    background: rgba(255,255,255,0.1); border: none; color: white;
    font-size: 22px; width: 40px; height: 40px;
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* PROGRESS */
  .progress-empty { text-align: center; padding: 40px 20px; color: var(--text3); }
  .progress-empty .big-icon { font-size: 44px; margin-bottom: 14px; }
  .progress-empty p { font-size: 14px; line-height: 1.6; }
  .upload-zone {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 20px; text-align: center; cursor: pointer;
    transition: all 0.2s; margin-bottom: 20px;
  }
  .upload-zone:hover { border-color: var(--accent2); background: rgba(123,97,255,0.04); }
  .upload-zone p { font-size: 13px; color: var(--text2); margin-top: 8px; }

  .photo-date-group { margin-bottom: 22px; }
  .photo-date-label { font-size: 11px; font-family: 'Unbounded', sans-serif; color: var(--text3); letter-spacing: 0.1em; margin-bottom: 8px; }
  .photo-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .photo-row::-webkit-scrollbar { display: none; }
  .photo-thumb-wrap { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
  .photo-thumb { width: 100px; height: 130px; object-fit: cover; border-radius: 10px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
  .photo-thumb:hover { border-color: var(--accent2); }
  .photo-delete-btn {
    position: absolute; top: 4px; right: 4px;
    width: 24px; height: 24px;
    background: var(--accent3); border: none; border-radius: 50%;
    color: white; font-size: 13px; font-weight: 700; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    z-index: 2; box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .gallery-edit-mode .photo-delete-btn { display: flex; }
  .gallery-edit-mode .photo-thumb { border-color: var(--border); }
  .edit-gallery-btn {
    font-size: 11px; color: var(--text3);
    background: none; border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 12px;
    cursor: pointer; transition: all 0.2s;
    font-family: 'Golos Text', sans-serif;
    margin-bottom: 14px;
  }
  .edit-gallery-btn.active { color: var(--accent3); border-color: var(--accent3); }
  .photo-view-label { font-size: 10px; color: var(--text3); }

  .compare-tabs { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; scrollbar-width: none; }
  .compare-tabs::-webkit-scrollbar { display: none; }
  .compare-tab {
    flex-shrink: 0; padding: 7px 12px; border-radius: 20px;
    border: 1.5px solid var(--border); background: none; color: var(--text2);
    font-size: 11px; font-family: 'Unbounded', sans-serif; font-weight: 600;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .compare-tab.active { border-color: var(--accent2); color: var(--accent2); background: rgba(123,97,255,0.1); }

  .compare-views { display: flex; gap: 6px; margin-bottom: 12px; }
  .view-chip {
    flex-shrink: 0; padding: 5px 12px; border-radius: 20px; font-size: 11px;
    border: 1px solid var(--border); background: none; color: var(--text3);
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .view-chip.active { background: var(--surface2); color: var(--text); border-color: var(--text3); }

  .compare-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .compare-photo-wrap { display: flex; flex-direction: column; gap: 6px; }
  .compare-photo { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 10px; cursor: pointer; }
  .compare-label { font-size: 11px; color: var(--text2); text-align: center; }
  .compare-empty-slot {
    width: 100%; aspect-ratio: 3/4; background: var(--surface2); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text3); font-size: 12px; text-align: center; padding: 10px;
  }
  .open-compare-btn {
    display: block; width: 100%;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px;
    color: var(--text2); font-family: 'Golos Text', sans-serif; font-size: 13px;
    cursor: pointer; text-align: center; margin-top: 4px; margin-bottom: 12px;
    transition: border-color 0.2s, color 0.2s;
  }
  .open-compare-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* FULLSCREEN COMPARE */
  .compare-fs {
    display: none; position: fixed; inset: 0;
    background: #000; z-index: 600;
    flex-direction: column;
    touch-action: none;
  }
  .compare-fs.open { display: flex; }
  .compare-fs-header {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 16px 12px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    z-index: 10;
  }
  .compare-fs-label {
    font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 600;
    color: white; letter-spacing: 0.05em;
  }
  .compare-fs-date { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .compare-fs-close {
    background: rgba(255,255,255,0.15); border: none; color: white;
    width: 36px; height: 36px; border-radius: 50%; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .compare-fs-track {
    flex: 1; display: flex; transition: transform 0.3s ease;
    will-change: transform;
  }
  .compare-fs-slide {
    flex-shrink: 0; width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .compare-fs-slide img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    transform-origin: center center;
    transition: transform 0.1s;
    user-select: none; -webkit-user-select: none;
  }
  .compare-fs-dots {
    position: absolute; bottom: 24px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 8px; z-index: 10;
  }
  .compare-fs-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.35); transition: background 0.2s;
  }
  .compare-fs-dot.active { background: white; }
  .compare-fs-hint {
    position: absolute; bottom: 44px; left: 0; right: 0;
    text-align: center; font-size: 11px; color: rgba(255,255,255,0.4);
    z-index: 10; pointer-events: none;
  }
  .measurements-block {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-top: 10px;
  }
  .measurements-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .measurements-title { font-size: 11px; color: var(--text3); font-family: 'Unbounded', sans-serif; letter-spacing: 0.08em; }
  .measurements-edit-btn {
    font-size: 11px; color: var(--text3); background: none; border: none;
    cursor: pointer; padding: 2px 6px; border-radius: 6px;
    transition: color 0.2s;
  }
  .measurements-edit-btn:hover { color: var(--accent); }
  .measurements-text {
    font-size: 13px; color: var(--text2); line-height: 1.6; white-space: pre-wrap;
    min-height: 20px;
  }
  .measurements-empty { font-size: 12px; color: var(--text3); font-style: italic; }
  .measurements-textarea {
    width: 100%; background: var(--surface3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Golos Text', sans-serif;
    font-size: 13px; padding: 10px; outline: none; resize: none;
    line-height: 1.6; min-height: 80px;
  }
  .date-select {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'Golos Text', sans-serif; font-size: 13px;
    padding: 10px 12px; outline: none; appearance: none;
  }

  .no-weight { color: var(--text3); font-size: 12px; font-style: italic; }

  .toast {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 10px 18px;
    font-size: 13px; color: var(--text);
    z-index: 700; opacity: 0; transition: all 0.3s;
    white-space: nowrap; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  input[type="file"] { display: none; }
  .action-btn {
    background: var(--accent); color: var(--bg); border: none;
    border-radius: 12px; padding: 14px;
    font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; width: 100%; margin-top: 4px;
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">GYM</div>
  <div style="display:flex;align-items:center;gap:8px">
    <div style="font-size:10px;color:var(--text3);font-family:'Unbounded',sans-serif" id="appVersion"></div>
    <div class="day-badge gym" id="headerDayBadge">ПН · ЗАЛ</div>
  </div>
</div>

<div class="screen active" id="screen-today">
  <div class="day-tabs" id="dayTabs"></div>
  <div id="workoutContent"></div>
</div>

<div class="screen" id="screen-progress">
  <div class="compare-tabs" id="compareTabs">
    <button class="compare-tab active" data-mode="all">За всё время</button>
    <button class="compare-tab" data-mode="week">Неделя</button>
    <button class="compare-tab" data-mode="custom">Свободный выбор</button>
    <button class="compare-tab" data-mode="gallery">Все фото</button>
  </div>
  <div class="compare-views" id="viewChips">
    <button class="view-chip active" data-view="front">Анфас</button>
    <button class="view-chip" data-view="side">Профиль</button>
    <button class="view-chip" data-view="back">Спина</button>
  </div>
  <div id="progressContent"></div>
  <div class="upload-zone" id="uploadZone">
    <div style="font-size:30px">📸</div>
    <p>Добавить фото прогресса</p>
  </div>
  <div class="upload-zone" id="addMeasurementsZone" style="margin-top:0" onclick="addMeasurementsForDate()">
    <div style="font-size:26px">📏</div>
    <p>Добавить замеры без фото</p>
  </div>
  <input type="file" id="progressFileInput" accept="image/*" multiple>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="switchScreen('today',this)">
    <div class="nav-icon">🏋️</div><span>Тренировка</span>
  </button>
  <button class="nav-btn" onclick="switchScreen('progress',this)">
    <div class="nav-icon">📸</div><span>Прогресс</span>
  </button>
</div>

<!-- HISTORY MODAL -->
<div class="modal-overlay" id="historyModal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="historyModalTitle"></div>
    <div id="historyModalContent"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">

// ============================================================
// STATE
// ============================================================
let state = {
  currentDay: 'mon',
  weights: {}, weightHistory: {},
  measurements: {},
  media: {},
  completedSets: {},
  lastResetDate: null,
  progressPhotos: [],
  compareMode: 'all', compareView: 'front',
};

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('workout_v3') || '{}');
    state.weights      = s.weights      || {};
    state.weightHistory= s.weightHistory|| {};
    state.measurements = s.measurements || {};
    state.lastResetDate= s.lastResetDate|| null;
    state.completedSets= s.completedSets|| {};
  } catch(e) {}

  Object.keys(EXERCISES).forEach(function(id) {
    if (!(id in state.weights)) state.weights[id] = EXERCISES[id].weight != null ? EXERCISES[id].weight : null;
  });

  const today = todayStr();
  if (state.lastResetDate !== today) {
    state.completedSets = {};
    state.lastResetDate = today;
    saveState();
  }
}

function saveState() {
  try {
    localStorage.setItem('workout_v3', JSON.stringify({
      weights:       state.weights,
      weightHistory: state.weightHistory,
      measurements:  state.measurements,
      lastResetDate: state.lastResetDate,
      completedSets: state.completedSets,
    }));
  } catch(e) {}
}

// Save whenever app is hidden (minimized, tab switch)
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'hidden') saveState();
});
window.addEventListener('pagehide', saveState);

// ============================================================
// WEIGHT — save previous weight before first change of day
// ============================================================
var weightDebounceTimers = {};

function changeWeight(exId, delta, wEl) {
  var ex   = EXERCISES[exId];
  var step = ex.weightStep || 0.25;
  var cur  = state.weights[exId] != null ? state.weights[exId] : 0;
  var newVal = Math.round((cur + delta * step) * 100) / 100;
  if (newVal < 0) return;

  // Record old weight as history entry before first change today
  var today = todayStr();
  if (!state.weightHistory[exId]) state.weightHistory[exId] = [];
  var hist = state.weightHistory[exId];
  if (!weightDebounceTimers[exId] && (!hist.length || hist[hist.length-1].date !== today)) {
    hist.push({ date: today, weight: cur });
  }

  state.weights[exId] = newVal;
  if (wEl) wEl.textContent = newVal + ' ' + (ex.weightUnit || 'кг');

  clearTimeout(weightDebounceTimers[exId]);
  weightDebounceTimers[exId] = setTimeout(function() {
    delete weightDebounceTimers[exId];
    saveState();
  }, 800);
  saveState();
}

// ============================================================
// SET DOTS
// ============================================================
function toggleSet(uid, idx, total) {
  if (!state.completedSets[uid]) state.completedSets[uid] = [];
  var arr = state.completedSets[uid];
  var pos = arr.indexOf(idx);
  if (pos === -1) arr.push(idx); else arr.splice(pos, 1);
  saveState(); // save immediately
  var row = document.getElementById('sets_' + uid);
  if (row) row.innerHTML = buildDots(uid, total);
  if (arr.length >= total && total > 0) showToast('\u2713 \u0423\u043f\u0440\u0430\u0436\u043d\u0435\u043d\u0438\u0435 \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u043e!');
}

function buildDots(uid, total) {
  if (!total) return '';
  var done = state.completedSets[uid] || [];
  if (done.length >= total) {
    return '<span class="sets-done-check">\u2713</span><span class="sets-done-label">\u0413\u043e\u0442\u043e\u0432\u043e!</span>';
  }
  var h = '';
  for (var i = 0; i < total; i++) {
    var cls = done.indexOf(i) !== -1 ? 'done' : '';
    h += '<button class="set-dot ' + cls + '" onclick="event.stopPropagation();toggleSet(\'' + uid + '\',' + i + ',' + total + ')"></button>';
  }
  return h;
}

// ============================================================
// TIMERS
// ============================================================
var timers = {};
function startTimer(uid, secs, btn) {
  if (timers[uid]) {
    clearInterval(timers[uid]);
    delete timers[uid];
    btn.classList.remove('running');
    btn.querySelector('.timer-display').textContent = fmtSec(secs);
    return;
  }
  var rem = secs;
  btn.classList.add('running');
  var disp = btn.querySelector('.timer-display');
  timers[uid] = setInterval(function() {
    rem--;
    disp.textContent = fmtSec(rem);
    if (rem <= 0) {
      clearInterval(timers[uid]); delete timers[uid];
      btn.classList.remove('running');
      disp.textContent = fmtSec(secs);
      showToast('\u23f1 \u0412\u0440\u0435\u043c\u044f!');
      if (navigator.vibrate) navigator.vibrate([200,100,200]);
    }
  }, 1000);
}
function fmtSec(s) {
  if (s <= 0) return '0\u0441';
  var m = Math.floor(s/60), sec = s % 60;
  return m > 0 ? m + ':' + String(sec).padStart(2,'0') : s + '\u0441';
}

function renderWorkout() {
  var day = state.currentDay;
  var w   = WORKOUTS[day];
  var badge = document.getElementById('headerDayBadge');
  badge.textContent = w.label + ' \u00b7 ' + (w.type === 'gym' ? '\u0417\u0410\u041b' : '\u0414\u041e\u041c\u0410');
  badge.className = 'day-badge ' + w.type;

  var html = '';
  w.sections.forEach(function(sec) {
    html += '<div class="section-label">' + sec.label + '</div>';
    sec.exercises.forEach(function(e, i) { html += renderCard(e, i+1, day); });
  });
  document.getElementById('workoutContent').innerHTML = html;
}

function renderCard(entry, num, day) {
  var ex = EXERCISES[entry.id];
  if (!ex) return '';
  var uid = day + '_' + entry.id + '_' + num;
  var hasW = ex.weightStep != null;

  var meta = [];
  if (entry.sets && entry.reps) meta.push(entry.sets + ' \u00d7 ' + entry.reps);
  else if (entry.sets && entry.time) meta.push(entry.sets + ' \u00d7 ' + fmtSec(entry.time));
  else if (entry.sets) meta.push(entry.sets + ' \u043f\u043e\u0434\u0445.');
  if (entry.note) meta.push(entry.note);

  var wVal = state.weights[entry.id];
  var wDisplay = (wVal != null) ? (wVal + ' ' + (ex.weightUnit || '\u043a\u0433')) : (ex.weightDisplay || '\u2014');

  var weightHTML = '';
  if (hasW) {
    weightHTML = '<div class="ex-right">'
      + '<div class="ex-weight-controls">'
      + '<button class="w-btn" onclick="event.stopPropagation();changeWeight(\'' + entry.id + '\',-1,document.getElementById(\'w_' + uid + '\'))">−</button>'
      + '<div class="w-value" id="w_' + uid + '">' + wDisplay + '</div>'
      + '<button class="w-btn" onclick="event.stopPropagation();changeWeight(\'' + entry.id + '\',1,document.getElementById(\'w_' + uid + '\'))">+</button>'
      + '</div>'
      + '<button class="w-history-btn" onclick="event.stopPropagation();showHistory(\'' + entry.id + '\')">\ud83d\udcc8 \u0438\u0441\u0442\u043e\u0440\u0438\u044f</button>'
      + '</div>';
  } else if (ex.weightDisplay) {
    weightHTML = '<div class="ex-right"><div class="no-weight">' + ex.weightDisplay + '</div></div>';
  }

  var total = entry.sets || 0;
  var dotsHTML = total > 0 ? '<div class="sets-row" id="sets_' + uid + '">' + buildDots(uid, total) + '</div>' : '';
  var timerHTML = entry.time ? '<button class="timer-chip" onclick="startTimer(\'' + uid + '\',' + entry.time + ',this)">\u23f1 <span class="timer-display">' + fmtSec(entry.time) + '</span></button><br>' : '';

  var mediaFiles = (state.media || {})[entry.id] || [];
  var mediaGridHTML = '';
  if (mediaFiles.length) {
    mediaGridHTML = '<div class="media-grid">' + mediaFiles.map(function(f, i) {
      if (f.type === 'video') {
        return '<div class="media-item"><div class="media-video-thumb" onclick="openLightboxVideo(\'' + entry.id + '\',' + i + ')">\ud83c\udfa6</div><button class="media-remove" onclick="removeMedia(\'' + entry.id + '\',' + i + ')">\u2715</button></div>';
      }
      return '<div class="media-item"><img class="media-thumb" src="' + f.src + '" onclick="openLightboxImg(\'' + entry.id + '\',' + i + ')"><button class="media-remove" onclick="removeMedia(\'' + entry.id + '\',' + i + ')">\u2715</button></div>';
    }).join('') + '</div>';
  }

  return '<div class="ex-card">'
    + '<div class="ex-header" onclick="toggleDetail(\'' + uid + '\')">'
    + '<div class="ex-num">' + num + '</div>'
    + '<div class="ex-info">'
    + '<div class="ex-name">' + ex.name + '</div>'
    + '<div class="ex-meta-line">' + meta.join(' \u00b7 ') + '</div>'
    + dotsHTML
    + '</div>'
    + weightHTML
    + '<svg class="ex-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>'
    + '</div>'
    + '<div class="ex-detail" id="detail_' + uid + '">'
    + '<div class="ex-detail-inner">'
    + timerHTML
    + (ex.tech ? '<div class="tech-text">' + ex.tech + '</div>' : '')
    + mediaGridHTML
    + '<div class="media-placeholder" onclick="document.getElementById(\'mi_' + uid + '\').click()">'
    + '<span>\ud83d\udcce</span><span class="media-placeholder-text">\u041f\u0440\u0438\u043a\u0440\u0435\u043f\u0438\u0442\u044c \u0444\u043e\u0442\u043e / \u0432\u0438\u0434\u0435\u043e</span>'
    + '</div>'
    + '<input type="file" id="mi_' + uid + '" accept="image/*,video/*" multiple onchange="handleMediaFiles(\'' + entry.id + '\',this)">'
    + '</div></div></div>';
}

function toggleDetail(uid) {
  var el = document.getElementById('detail_' + uid);
  if (el) el.classList.toggle('open');
}

function handleMediaFiles(exId, input) {
  if (!state.media) state.media = {};
  if (!state.media[exId]) state.media[exId] = [];
  Array.from(input.files).forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      state.media[exId].push({ src: e.target.result, type: file.type.startsWith('video') ? 'video' : 'image' });
      renderWorkout();
      showToast('\u041c\u0435\u0434\u0438\u0430\u0444\u0430\u0439\u043b \u043f\u0440\u0438\u043a\u0440\u0435\u043f\u043b\u0451\u043d');
    };
    reader.readAsDataURL(file);
  });
}
function removeMedia(exId, idx) {
  if (state.media && state.media[exId]) { state.media[exId].splice(idx, 1); renderWorkout(); }
}
function openLightboxImg(exId, idx) {
  document.getElementById('lightboxImg').src = state.media[exId][idx].src;
  document.getElementById('lightboxImg').style.display = 'block';
  document.getElementById('lightboxVideo').style.display = 'none';
  document.getElementById('lightbox').classList.add('open');
  history.pushState({ lb: true }, '');
}
function openLightboxVideo(exId, idx) {
  var vid = document.getElementById('lightboxVideo');
  vid.src = state.media[exId][idx].src;
  vid.style.display = 'block';
  document.getElementById('lightboxImg').style.display = 'none';
  document.getElementById('lightbox').classList.add('open');
  history.pushState({ lb: true }, '');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  try { document.getElementById('lightboxVideo').pause(); } catch(e) {}
}

function showHistory(exId) {
  var ex   = EXERCISES[exId];
  var hist = (state.weightHistory[exId] || []).slice().reverse();
  document.getElementById('historyModalTitle').textContent = ex.name;
  var html = '';
  if (!hist.length) {
    html = '<div style="color:var(--text3);font-size:14px;padding:20px 0;text-align:center">\u0418\u0441\u0442\u043e\u0440\u0438\u044f \u043f\u043e\u043a\u0430 \u043f\u0443\u0441\u0442\u0430</div>';
  } else {
    hist.forEach(function(entry, i) {
      var prev = hist[i+1];
      var diffHTML = '';
      if (prev) {
        var d = Math.round((entry.weight - prev.weight) * 100) / 100;
        if (d > 0) diffHTML = '<span class="history-diff up">+' + d + '</span>';
        else if (d < 0) diffHTML = '<span class="history-diff down">' + d + '</span>';
        else diffHTML = '<span class="history-diff same">\u2014</span>';
      }
      var ds = formatDateRU(entry.date);
      html += '<div class="history-item">'
        + '<div class="history-date">' + ds + '</div>'
        + '<div style="display:flex;align-items:center;gap:8px">' + diffHTML
        + '<div class="history-weight">' + entry.weight + ' ' + (ex.weightUnit || '\u043a\u0433') + '</div></div>'
        + '</div>';
    });
  }
  document.getElementById('historyModalContent').innerHTML = html;
  document.getElementById('historyModal').classList.add('open');
}

// ============================================================
// INDEXEDDB
// ============================================================
var db = null;
function openDB() {
  return new Promise(function(resolve, reject) {
    if (db) { resolve(db); return; }
    var req = indexedDB.open('gym_photos_v1', 1);
    req.onupgradeneeded = function(e) {
      var d = e.target.result;
      if (!d.objectStoreNames.contains('photos')) d.createObjectStore('photos', { keyPath: 'id' });
    };
    req.onsuccess = function(e) { db = e.target.result; resolve(db); };
    req.onerror = function() { reject(req.error); };
  });
}
function dbSavePhoto(photo) {
  return openDB().then(function(d) {
    return new Promise(function(resolve, reject) {
      var tx = d.transaction('photos', 'readwrite');
      tx.objectStore('photos').put(photo);
      tx.oncomplete = resolve; tx.onerror = function() { reject(tx.error); };
    });
  });
}
function dbDeletePhoto(id) {
  return openDB().then(function(d) {
    return new Promise(function(resolve, reject) {
      var tx = d.transaction('photos', 'readwrite');
      tx.objectStore('photos').delete(id);
      tx.oncomplete = resolve; tx.onerror = function() { reject(tx.error); };
    });
  });
}
function dbLoadAllPhotos() {
  return openDB().then(function(d) {
    return new Promise(function(resolve, reject) {
      var tx = d.transaction('photos', 'readonly');
      var req = tx.objectStore('photos').getAll();
      req.onsuccess = function() { resolve(req.result || []); };
      req.onerror = function() { reject(req.error); };
    });
  });
}

// ============================================================
// DATE HELPERS
// ============================================================
function parseDateFromFilename(filename) {
  var m = filename.match(/(\d{4})(\d{2})(\d{2})_(\d{6})/);
  if (!m) m = filename.match(/(\d{4})(\d{2})(\d{2})/);
  if (!m) return null;
  var y = parseInt(m[1]), mo = parseInt(m[2]), d = parseInt(m[3]);
  if (y < 2000 || y > 2100 || mo < 1 || mo > 12 || d < 1 || d > 31) return null;
  return m[1] + '-' + m[2] + '-' + m[3];
}
function formatDateRU(dateStr) {
  var parts = dateStr.split('-');
  var months = ['\u044f\u043d\u0432\u0430\u0440\u044f','\u0444\u0435\u0432\u0440\u0430\u043b\u044f','\u043c\u0430\u0440\u0442\u0430','\u0430\u043f\u0440\u0435\u043b\u044f','\u043c\u0430\u044f','\u0438\u044e\u043d\u044f','\u0438\u044e\u043b\u044f','\u0430\u0432\u0433\u0443\u0441\u0442\u0430','\u0441\u0435\u043d\u0442\u044f\u0431\u0440\u044f','\u043e\u043a\u0442\u044f\u0431\u0440\u044f','\u043d\u043e\u044f\u0431\u0440\u044f','\u0434\u0435\u043a\u0430\u0431\u0440\u044f'];
  return parseInt(parts[2]) + ' ' + months[parseInt(parts[1])-1] + ' ' + parts[0];
}
function formatDateShortRU(dateStr) {
  var parts = dateStr.split('-');
  var months = ['\u044f\u043d\u0432','\u0444\u0435\u0432','\u043c\u0430\u0440','\u0430\u043f\u0440','\u043c\u0430\u0439','\u0438\u044e\u043d','\u0438\u044e\u043b','\u0430\u0432\u0433','\u0441\u0435\u043d','\u043e\u043a\u0442','\u043d\u043e\u044f','\u0434\u0435\u043a'];
  return parseInt(parts[2]) + ' ' + months[parseInt(parts[1])-1] + ' ' + parts[0];
}

function renderProgress() {
  var content = document.getElementById('progressContent');
  if (state.compareMode === 'gallery') renderGallery(content);
  else renderCompare(content);

var galleryEditMode = false;

function toggleGalleryEdit() {
  galleryEditMode = !galleryEditMode;
  var btn  = document.getElementById('editGalleryBtn');
  var grid = document.getElementById('galleryGrid');
  if (btn)  { btn.textContent = galleryEditMode ? '\u2713 \u0413\u043e\u0442\u043e\u0432\u043e' : '\u270e \u0423\u0434\u0430\u043b\u0438\u0442\u044c \u0444\u043e\u0442\u043e'; btn.classList.toggle('active', galleryEditMode); }
  if (grid) grid.classList.toggle('gallery-edit-mode', galleryEditMode);
}

function renderMeasurementsBlock(date) {
  var text = state.measurements[date] || '';
  var safeText = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/\n/g, '<br>');
  var inner = safeText || '<span class="measurements-empty">\u041d\u0430\u0436\u043c\u0438 \u270e \u0447\u0442\u043e\u0431\u044b \u0434\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u0437\u0430\u043c\u0435\u0440\u044b</span>';
  return '<div class="measurements-block">'
    + '<div class="measurements-header">'
    + '<div class="measurements-title">\u0417\u0410\u041c\u0415\u0420\u042b</div>'
    + '<button class="measurements-edit-btn" onclick="editMeasurements(\'' + date + '\')">\u270e \u0438\u0437\u043c\u0435\u043d\u0438\u0442\u044c</button>'
    + '</div>'
    + '<div class="measurements-text" id="mtext_' + date + '">' + inner + '</div>'
    + '</div>';
}

function editMeasurements(date) {
  var current = state.measurements[date] || '';
  var block = document.getElementById('mtext_' + date);
  if (!block) return;
  block.innerHTML = '<textarea class="measurements-textarea" id="mtextarea_' + date + '" placeholder="\u041d\u0430\u043f\u0440\u0438\u043c\u0435\u0440: \u0432\u0435\u0441 \u0442\u0435\u043b\u0430 62\u043a\u0433, \u0442\u0430\u043b\u0438\u044f 70\u0441\u043c, \u0431\u0451\u0434\u0440\u0430 96\u0441\u043c...">' + current + '</textarea>'
    + '<button onclick="saveMeasurements(\'' + date + '\')" style="margin-top:8px;background:var(--accent);color:var(--bg);border:none;border-radius:8px;padding:8px 16px;font-family:\'Golos Text\',sans-serif;font-size:12px;font-weight:600;cursor:pointer">\u0421\u043e\u0445\u0440\u0430\u043d\u0438\u0442\u044c</button>';
  var ta = document.getElementById('mtextarea_' + date);
  if (ta) ta.focus();
}

function saveMeasurements(date) {
  var ta = document.getElementById('mtextarea_' + date);
  if (!ta) return;
  var val = ta.value.trim();
  if (val) state.measurements[date] = val; else delete state.measurements[date];
  saveState();
  var block = document.getElementById('mtext_' + date);
  if (block) {
    var safeText = val.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>');
    block.innerHTML = safeText || '<span class="measurements-empty">\u041d\u0430\u0436\u043c\u0438 \u270e \u0447\u0442\u043e\u0431\u044b \u0434\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u0437\u0430\u043c\u0435\u0440\u044b</span>';
  }
}

function addMeasurementsForDate() {
  state.compareMode = 'gallery';
  document.querySelectorAll('.compare-tab').forEach(function(b) { b.classList.toggle('active', b.dataset.mode === 'gallery'); });
  renderProgress();
  var today = todayStr();
  setTimeout(function() { editMeasurements(today); }, 150);
}

function renderGallery(container) {
  var photos = state.progressPhotos;
  var photoDates = {};
  photos.forEach(function(p) { photoDates[p.date] = true; });
  var measDates = Object.keys(state.measurements);
  var allDatesSet = {};
  Object.keys(photoDates).forEach(function(d) { allDatesSet[d] = true; });
  measDates.forEach(function(d) { allDatesSet[d] = true; });
  var allDates = Object.keys(allDatesSet).sort().reverse();

  if (!allDates.length) {
    container.innerHTML = '<div class="progress-empty"><div class="big-icon">\ud83d\udcf8</div><p>\u0414\u043e\u0431\u0430\u0432\u044c \u043f\u0435\u0440\u0432\u043e\u0435 \u0444\u043e\u0442\u043e</p></div>';
    galleryEditMode = false;
    return;
  }

  var byDate = {};
  photos.forEach(function(p) {
    if (!byDate[p.date]) byDate[p.date] = [];
    byDate[p.date].push(p);
  });

  var vL = { front:'\u0410\u043d\u0444\u0430\u0441', side:'\u041f\u0440\u043e\u0444\u0438\u043b\u044c', back:'\u0421\u043f\u0438\u043d\u0430' };
  var editBtn = galleryEditMode ? '\u2713 \u0413\u043e\u0442\u043e\u0432\u043e' : '\u270e \u0423\u0434\u0430\u043b\u0438\u0442\u044c \u0444\u043e\u0442\u043e';
  var html = '<button class="edit-gallery-btn ' + (galleryEditMode?'active':'') + '" id="editGalleryBtn" onclick="toggleGalleryEdit()">' + editBtn + '</button>';
  html += '<div id="galleryGrid" class="' + (galleryEditMode?'gallery-edit-mode':'') + '">';

  allDates.forEach(function(date) {
    html += '<div class="photo-date-group"><div class="photo-date-label">' + formatDateRU(date) + '</div>';
    var dayPhotos = byDate[date] || [];
    if (dayPhotos.length) {
      html += '<div class="photo-row">';
      ['front','side','back'].forEach(function(v) {
        var p = dayPhotos.filter(function(x) { return x.view === v; })[0];
        if (p) {
          html += '<div class="photo-thumb-wrap">'
            + '<img class="photo-thumb" src="' + p.src + '" onclick="openProgressLightbox(\'' + p.id + '\')">'
            + '<button class="photo-delete-btn" onclick="deletePhoto(\'' + p.id + '\')">\u2715</button>'
            + '<div class="photo-view-label">' + vL[v] + '</div>'
            + '</div>';
        }
      });
      html += '</div>';
    }
    html += renderMeasurementsBlock(date);
    html += '</div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

function renderCompare(container) {
  var vL = { front:'\u0410\u043d\u0444\u0430\u0441', side:'\u041f\u0440\u043e\u0444\u0438\u043b\u044c', back:'\u0421\u043f\u0438\u043d\u0430' };
  var view = state.compareView;
  var filtered = state.progressPhotos.filter(function(p) { return p.view === view; }).sort(function(a,b) { return a.date < b.date ? -1 : 1; });

  if (!filtered.length) {
    container.innerHTML = '<div class="progress-empty"><div class="big-icon">\ud83d\udcf7</div><p>\u041d\u0435\u0442 \u0444\u043e\u0442\u043e \u00ab' + vL[view] + '\u00bb<br>\u0414\u043e\u0431\u0430\u0432\u044c \u043d\u0438\u0436\u0435</p></div>';
    return;
  }

  if (state.compareMode === 'custom') {
    var dates = [];
    var seen = {};
    state.progressPhotos.forEach(function(p) { if (!seen[p.date]) { seen[p.date] = true; dates.push(p.date); } });
    dates.sort();
    var opts = dates.map(function(d) { return '<option value="' + d + '">' + formatDateRU(d) + '</option>'; }).join('');
    var selL = (container.querySelector('#customLeft') || {}).value || '';
    var selR = (container.querySelector('#customRight') || {}).value || '';
    var left  = selL ? filtered.filter(function(p) { return p.date === selL; })[0] : null;
    var right = selR ? filtered.filter(function(p) { return p.date === selR; })[0] : null;
    var lL = selL ? formatDateShortRU(selL) : '\u0414\u0430\u0442\u0430 1';
    var rL = selR ? formatDateShortRU(selR) : '\u0414\u0430\u0442\u0430 2';
    container.innerHTML = '<div class="date-select-row">'
      + '<select class="date-select" id="customLeft" onchange="renderProgress()"><option value="">\u0414\u0430\u0442\u0430 1</option>' + opts + '</select>'
      + '<select class="date-select" id="customRight" onchange="renderProgress()"><option value="">\u0414\u0430\u0442\u0430 2</option>' + opts + '</select>'
      + '</div>' + pairHTML(left, right, lL, rL);
    if (selL) container.querySelector('#customLeft').value = selL;
    if (selR) container.querySelector('#customRight').value = selR;
    return;
  }

  var left, right, lL, rL;
  if (state.compareMode === 'all') {
    left = filtered[0]; right = filtered[filtered.length-1];
    lL = '\u041d\u0430\u0447\u0430\u043b\u043e'; rL = '\u0421\u0435\u0439\u0447\u0430\u0441';
  } else {
    right = filtered[filtered.length-1];
    var wa = new Date(right.date + 'T12:00:00'); wa.setDate(wa.getDate()-7);
    var waS = wa.toISOString().slice(0,10);
    left = filtered.reduce(function(b,p) { return p.date <= waS ? p : b; }, null) || (filtered.length > 1 ? filtered[filtered.length-2] : filtered[0]);
    lL = '~\u041d\u0435\u0434\u0435\u043b\u044e \u043d\u0430\u0437\u0430\u0434'; rL = '\u0421\u0435\u0439\u0447\u0430\u0441';
  }
  container.innerHTML = pairHTML(left, right, lL, rL);
}

function pairHTML(left, right, lL, rL) {
  function slot(p, label) {
    if (!p) return '<div class="compare-photo-wrap"><div class="compare-empty-slot">\u041d\u0435\u0442 \u0444\u043e\u0442\u043e</div><div class="compare-label">' + label + '</div></div>';
    return '<div class="compare-photo-wrap">'
      + '<img class="compare-photo" src="' + p.src + '" onclick="openCompareFs()">'
      + '<div class="compare-label">' + label + '<br><span style="color:var(--text3);font-size:10px">' + formatDateShortRU(p.date) + '</span></div>'
      + '</div>';
  }
  window._compareLeft  = left;  window._compareLeftLabel  = lL;
  window._compareRight = right; window._compareRightLabel = rL;
  var btnHTML = (left && right) ? '<button class="open-compare-btn" onclick="openCompareFs()">\ud83d\udd0d \u041e\u0442\u043a\u0440\u044b\u0442\u044c \u0441\u0440\u0430\u0432\u043d\u0435\u043d\u0438\u0435 \u043d\u0430 \u0432\u0435\u0441\u044c \u044d\u043a\u0440\u0430\u043d</button>' : '';
  return '<div class="compare-pair">' + slot(left,lL) + slot(right,rL) + '</div>' + btnHTML;
}

function openProgressLightbox(id) {
  var p = state.progressPhotos.filter(function(x) { return x.id === id; })[0];
  if (!p) return;
  document.getElementById('lightboxImg').src = p.src;
  document.getElementById('lightboxImg').style.display = 'block';
  document.getElementById('lightboxVideo').style.display = 'none';
  document.getElementById('lightbox').classList.add('open');
  history.pushState({ lb: true }, '');
}

function deletePhoto(id) {
  if (!confirm('\u0423\u0434\u0430\u043b\u0438\u0442\u044c \u044d\u0442\u043e \u0444\u043e\u0442\u043e?')) return;
  dbDeletePhoto(id).then(function() {
    state.progressPhotos = state.progressPhotos.filter(function(p) { return p.id !== id; });
    savePhotoIndex();
    renderProgress();
    showToast('\u0424\u043e\u0442\u043e \u0443\u0434\u0430\u043b\u0435\u043d\u043e');
  });
}

// ============================================================
// PHOTO UPLOAD
// ============================================================
var pendingFiles = [];

function savePhotoIndex() {
  try {
    var index = state.progressPhotos.map(function(p) { return { id: p.id, date: p.date, view: p.view }; });
    localStorage.setItem('gym_photo_index', JSON.stringify(index));
  } catch(e) {}
}

function loadPhotos() {
  return dbLoadAllPhotos().then(function(allFromDB) {
    try {
      var index = JSON.parse(localStorage.getItem('gym_photo_index') || '[]');
      var byId = {};
      allFromDB.forEach(function(p) { byId[p.id] = p; });
      state.progressPhotos = index.map(function(meta) { return byId[meta.id]; }).filter(Boolean);
    } catch(e) { state.progressPhotos = []; }
  }).catch(function() { state.progressPhotos = []; });
}

document.getElementById('uploadZone').addEventListener('click', function() {
  var inp = document.getElementById('progressFileInput');
  inp.value = '';
  inp.click();
});

document.getElementById('progressFileInput').addEventListener('change', function() {
  pendingFiles = Array.from(this.files);
  if (!pendingFiles.length) return;
  var firstName   = pendingFiles[0].name;
  var parsedDate  = parseDateFromFilename(firstName);
  var today       = todayStr();
  document.getElementById('photoDate').value = parsedDate || today;
  var hint = document.getElementById('photoDateHint');
  if (hint) {
    if (parsedDate) {
      hint.style.color = 'var(--accent)';
      hint.textContent = '\ud83d\udcc5 \u0414\u0430\u0442\u0430 \u0438\u0437 \u0438\u043c\u0435\u043d\u0438 \u0444\u0430\u0439\u043b\u0430: ' + formatDateRU(parsedDate);
    } else {
      hint.style.color = 'var(--text3)';
      hint.textContent = '\u0418\u043c\u044f \u0444\u0430\u0439\u043b\u0430: ' + firstName + ' \u2014 \u0434\u0430\u0442\u0430 \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d\u0430, \u0432\u044b\u0431\u0435\u0440\u0438 \u0432\u0440\u0443\u0447\u043d\u0443\u044e';
      setTimeout(function() { document.getElementById('photoDate').focus(); }, 300);
    }
  }
  document.querySelectorAll('#viewPickRow .view-chip').forEach(function(b,i) { b.classList.toggle('active', i===0); });
  document.getElementById('photoMetaModal').classList.add('open');
});

function pickView(btn) {
  btn.closest('div').querySelectorAll('.view-chip').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
}

function savePhotoMeta() {
  var date  = document.getElementById('photoDate').value;
  var viewBtn = document.querySelector('#viewPickRow .view-chip.active');
  var view  = viewBtn ? viewBtn.getAttribute('data-pick') : 'front';
  var views = ['front','side','back'];
  var filesToProcess = pendingFiles.slice();
  pendingFiles = [];
  var total = filesToProcess.length;
  var done  = 0;
  document.getElementById('photoMetaModal').classList.remove('open');

  filesToProcess.forEach(function(file, i) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var photo = {
        id:   Date.now() + '_' + i + '_' + Math.random().toString(36).slice(2),
        src:  e.target.result,
        date: date,
        view: total > 1 ? views[i % 3] : view
      };
      dbSavePhoto(photo).then(function() {
        state.progressPhotos.push(photo);
        done++;
        if (done === total) {
          savePhotoIndex();
          renderProgress();
          showToast('\u0414\u043e\u0431\u0430\u0432\u043b\u0435\u043d\u043e ' + done + ' \u0444\u043e\u0442\u043e');
        }
      });
    };
    reader.onerror = function() { done++; };
    reader.readAsDataURL(file);
  });
}

// ============================================================
// FULLSCREEN COMPARE
// ============================================================
var cfsPhotos = [], cfsLabels = [], cfsIndex = 0, cfsZoomScale = 1;

function openCompareFs() {
  var left  = window._compareLeft;
  var right = window._compareRight;
  if (!left && !right) return;
  cfsPhotos = [left, right].filter(Boolean);
  cfsLabels = [window._compareLeftLabel, window._compareRightLabel].filter(function(l, i) { return !!cfsPhotos[i]; });
  cfsIndex = 0; cfsZoomScale = 1;

  var track = document.getElementById('compareFsTrack');
  track.innerHTML = cfsPhotos.map(function(p, i) {
    return '<div class="compare-fs-slide" id="cfsSlide' + i + '"><img src="' + p.src + '" id="cfsImg' + i + '" draggable="false"></div>';
  }).join('');

  updateCfsUI();
  document.getElementById('compareFs').classList.add('open');
  document.body.style.overflow = 'hidden';
  history.pushState({ cfs: true }, '');
  setTimeout(function() {
    var hint = document.getElementById('compareFsHint');
    if (hint) hint.style.opacity = '0';
  }, 2000);
}

function closeCompareFs() {
  document.getElementById('compareFs').classList.remove('open');
  document.body.style.overflow = '';
  cfsZoomScale = 1;
  cfsPhotos.forEach(function(_, i) {
    var img = document.getElementById('cfsImg' + i);
    if (img) { img.style.transform = 'scale(1)'; img.style.transformOrigin = 'center center'; }
  });
}

function updateCfsUI() {
  var track = document.getElementById('compareFsTrack');
  track.style.transform = 'translateX(-' + (cfsIndex * 100) + 'vw)';
  var p = cfsPhotos[cfsIndex];
  document.getElementById('compareFsLabel').textContent = cfsLabels[cfsIndex] || '';
  document.getElementById('compareFsDate').textContent  = p ? formatDateRU(p.date) : '';
  document.getElementById('compareFsDots').innerHTML = cfsPhotos.map(function(_, i) {
    return '<div class="compare-fs-dot ' + (i === cfsIndex ? 'active' : '') + '"></div>';
  }).join('');
}

// Back button
history.replaceState({ base: true }, '');
window.addEventListener('popstate', function(e) {
  if (document.getElementById('compareFs').classList.contains('open')) {
    closeCompareFs();
  } else if (document.getElementById('lightbox').classList.contains('open')) {
    closeLightbox();
  } else {
    history.pushState(null, '');
  }
});

// Touch for fullscreen compare — attached once
(function() {
  var fs = document.getElementById('compareFs');
  var slideState = {};
  var touchStartX = 0, touchStartY = 0;
  var isPinching = false, pinchStartDist = 0, pinchStartScale = 1, pinchMidX = 0, pinchMidY = 0;
  var lastTap = 0;

  function getS(idx) {
    if (!slideState[idx]) slideState[idx] = { scale:1, tx:0, ty:0 };
    return slideState[idx];
  }
  function applyT(idx) {
    var img = document.getElementById('cfsImg' + idx);
    if (!img) return;
    var s = getS(idx);
    img.style.transformOrigin = '0 0';
    img.style.transform = 'translate(' + s.tx + 'px,' + s.ty + 'px) scale(' + s.scale + ')';
  }
  function resetSlide(idx) {
    slideState[idx] = { scale:1, tx:0, ty:0 };
    var img = document.getElementById('cfsImg' + idx);
    if (img) { img.style.transition = 'transform 0.2s'; img.style.transformOrigin = 'center center'; img.style.transform = 'scale(1)'; }
    if (idx === cfsIndex) cfsZoomScale = 1;
  }

  fs.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      isPinching = true;
      pinchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      pinchStartScale = getS(cfsIndex).scale;
      pinchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      pinchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      e.preventDefault();
      return;
    }
    isPinching = false;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: false });

  fs.addEventListener('touchmove', function(e) {
    if (e.touches.length === 2 && isPinching) {
      e.preventDefault();
      var dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      var newScale = Math.min(6, Math.max(1, pinchStartScale * (dist / pinchStartDist)));
      var s = getS(cfsIndex);
      var slide = document.getElementById('cfsSlide' + cfsIndex);
      var rect = slide ? slide.getBoundingClientRect() : { left:0, top:0 };
      var fixX = pinchMidX - rect.left;
      var fixY = pinchMidY - rect.top;
      s.tx = fixX - (fixX - s.tx) * (newScale / s.scale);
      s.ty = fixY - (fixY - s.ty) * (newScale / s.scale);
      s.scale = newScale;
      cfsZoomScale = newScale;
      var img = document.getElementById('cfsImg' + cfsIndex);
      if (img) { img.style.transition = 'none'; applyT(cfsIndex); }
    }
  }, { passive: false });

  fs.addEventListener('touchend', function(e) {
    isPinching = false;
    var now = Date.now();
    if (now - lastTap < 300 && e.changedTouches.length === 1) {
      resetSlide(cfsIndex); lastTap = 0; return;
    }
    lastTap = now;
    if (e.changedTouches.length === 1 && e.touches.length === 0 && cfsZoomScale <= 1.05) {
      var dx = e.changedTouches[0].clientX - touchStartX;
      var dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
      if (Math.abs(dx) > 50 && Math.abs(dx) > dy) {
        var prev = cfsIndex;
        if (dx < 0 && cfsIndex < cfsPhotos.length - 1) cfsIndex++;
        else if (dx > 0 && cfsIndex > 0) cfsIndex--;
        if (cfsIndex !== prev) { resetSlide(prev); updateCfsUI(); }
      }
    }
  }, { passive: true });
})();

document.getElementById('compareTabs').addEventListener('click', function(e) {
  var btn = e.target.closest('.compare-tab');

  document.querySelectorAll('.compare-tab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');

  renderProgress();
});

document.getElementById('viewChips').addEventListener('click', function(e) {
  var chip = e.target.closest('.view-chip');
  if (!chip) return;
  document.querySelectorAll('#viewChips .view-chip').forEach(function(c) { c.classList.remove('active'); });
  chip.classList.add('active');

  renderProgress();
});

var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}
